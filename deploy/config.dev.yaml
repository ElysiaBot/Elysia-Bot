runtime:
  environment: development
  log_level: debug
  http_port: 8080
  sqlite_path: data/dev/runtime.sqlite
  smoke_store_backend: sqlite # set to postgres for v0 smoke-path event/idempotency verification only
  postgres_dsn: ""
  scheduler_interval_ms: 100
  bot_instances:
    - id: adapter-onebot-demo
      adapter: onebot
      source: onebot
      platform: onebot/v11
      demo_path: /demo/onebot/message

ai_chat:
  provider: mock # switch to openai_compat for the current narrow real-provider path
  endpoint: https://api.openai.com/v1/chat/completions # https required except localhost/loopback dev endpoints
  model: gpt-4.1-mini
  request_timeout_ms: 30000

secrets:
  webhook_token_ref: BOT_PLATFORM_WEBHOOK_TOKEN
  ai_chat_api_key_ref: BOT_PLATFORM_AI_CHAT_API_KEY # required when ai_chat.provider=openai_compat

rbac:
  actor_roles:
    admin-user: [admin]
  policies:
    admin:
      permissions: [plugin:enable, plugin:disable, plugin:rollout]
      plugin_scope: ["*"]
